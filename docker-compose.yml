services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - runvane_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - runvane_data:/app/data
    command: ["uv", "run", "python", "-m", "app.worker"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend

volumes:
  runvane_data:
